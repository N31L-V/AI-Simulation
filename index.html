<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Security Defense Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Space+Mono&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #020617;
            color: #f8fafc;
        }
        .mono { font-family: 'Space Mono', monospace; }
        .cyber-border {
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }
        .step-active {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }
        .glow-green { text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        .glow-red { text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header -->
    <header class="border-b border-slate-800 p-6 bg-slate-950/50 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-blue-400">PART 6: AI DEFENSE SIMULATION</h1>
                <p class="text-slate-500 text-sm">Mobile Banking Security Framework • April 13, 2026</p>
            </div>
            <div class="flex items-center gap-3 px-4 py-2 bg-emerald-500/10 border border-emerald-500/20 rounded-full">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                <span class="text-emerald-500 font-bold text-xs uppercase tracking-widest">System: Hardened</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Sidebar: Step Navigation -->
        <aside class="lg:col-span-4 space-y-3">
            <h2 class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-4">Simulation Sequence</h2>
            <div id="step-nav" class="space-y-2">
                <!-- Steps generated by JS -->
            </div>
        </aside>

        <!-- Main Simulation Area -->
        <section class="lg:col-span-8 space-y-6">
            
            <!-- Terminal View -->
            <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden cyber-border">
                <div class="bg-slate-950 px-6 py-3 border-b border-slate-800 flex justify-between items-center">
                    <div class="flex gap-1.5">
                        <div class="w-3 h-3 rounded-full bg-rose-500/20"></div>
                        <div class="w-3 h-3 rounded-full bg-amber-500/20"></div>
                        <div class="w-3 h-3 rounded-full bg-emerald-500/20"></div>
                    </div>
                    <span class="text-[10px] mono text-slate-500 uppercase">ai_incident_response_engine.v1</span>
                </div>

                <div class="p-6 md:p-10 space-y-10">
                    <!-- Attacker Perspective -->
                    <div class="space-y-4">
                        <div class="flex items-center gap-2 text-rose-500">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                            <span class="text-sm font-bold uppercase tracking-wider">Attacker Action</span>
                        </div>
                        <div id="attacker-text" class="bg-rose-500/5 border border-rose-500/20 p-6 rounded-xl text-lg text-rose-100 font-light leading-relaxed">
                            <!-- JS Content -->
                        </div>
                    </div>

                    <div class="flex justify-center relative">
                        <div class="h-10 w-px bg-gradient-to-b from-rose-500 to-emerald-500"></div>
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-slate-900 px-3 py-1 text-[10px] mono text-slate-500">DEFENSE LAYER</div>
                    </div>

                    <!-- Defense Response -->
                    <div class="space-y-4">
                        <div class="flex items-center gap-2 text-emerald-500">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
                            <span class="text-sm font-bold uppercase tracking-wider">System Defense Response</span>
                        </div>
                        <div id="defense-container" class="space-y-3">
                            <!-- JS Content -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex gap-4">
                <button id="prev-btn" class="flex-1 py-4 bg-slate-900 border border-slate-800 rounded-xl font-bold text-slate-400 hover:bg-slate-800 transition-all disabled:opacity-20">PREVIOUS</button>
                <button id="next-btn" class="flex-1 py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold text-white shadow-lg shadow-blue-500/20 transition-all">NEXT PHASE</button>
            </div>
        </section>
    </main>

    <script>
        const simulationSteps = [
            {
                title: "1. Reconnaissance",
                attacker: "I attempted to scan the system for open ports and public storage, but most endpoints are not accessible.",
                defense: ["Firewall blocks unauthorized scanning", "Public access to storage is disabled"],
                status: "BLOCKED"
            },
            {
                title: "2. Access Attempt",
                attacker: "I tried to log in using stolen admin credentials from a previous data breach.",
                defense: ["Multi-Factor Authentication (MFA) required", "Login attempt denied due to missing biometric verification"],
                status: "DENIED"
            },
            {
                title: "3. RBAC Barrier",
                attacker: "Even with valid low-level creds, I notice I don't have permissions to see the database.",
                defense: ["Role-Based Access Control (RBAC) enforced", "User limited strictly to Frontend deployment role"],
                status: "RESTRICTED"
            },
            {
                title: "4. Data Storage Access",
                attacker: "I bypassed a proxy to read stored financial data, but the files look like gibberish.",
                defense: ["Data is encrypted using AES-256", "Decryption keys isolated in KMS"],
                status: "ENCRYPTED"
            },
            {
                title: "5. Interception (MitM)",
                attacker: "I tried sniffing the network traffic between the mobile app and the API.",
                defense: ["TLS 1.2+ encryption protects data in transit", "Man-in-the-Middle attack failed"],
                status: "SECURE"
            },
            {
                title: "6. Port Exploitation",
                attacker: "I tried to SSH directly into the virtual machines through open ports.",
                defense: ["Default deny-all firewall policy", "Only Port 443 (HTTPS) allowed"],
                status: "FILTERED"
            },
            {
                title: "7. Anomaly Detection",
                attacker: "I tried to brute-force the API endpoints with multiple requests.",
                defense: ["Monitoring system detects spike in API calls", "SIEM generates high-priority alert"],
                status: "DETECTED"
            },
            {
                title: "8. Incident Response",
                attacker: "My connection was suddenly cut and my IP was blacklisted.",
                defense: ["Account temporarily locked", "Suspect IP address blocked at firewall level"],
                status: "ISOLATED"
            },
            {
                title: "9. Forensics",
                attacker: "I cannot delete my history; every command I typed is being logged.",
                defense: ["Centralized Audit Logs recorded all actions", "Tamper-proof log storage active"],
                status: "LOGGED"
            },
            {
                title: "10. Mission Failure",
                attacker: "The perimeter is impenetrable. No data exfiltrated. Mission aborted.",
                defense: ["No data breach occurred", "Financial systems remained secure", "Threat neutralized"],
                status: "VICTORY"
            }
        ];

        let currentStep = 0;

        const nav = document.getElementById('step-nav');
        const attackerEl = document.getElementById('attacker-text');
        const defenseEl = document.getElementById('defense-container');
        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');

        function init() {
            renderNav();
            updateSimulation();
        }

        function renderNav() {
            nav.innerHTML = simulationSteps.map((step, i) => `
                <div onclick="goToStep(${i})" class="p-3 rounded-lg border transition-all cursor-pointer flex items-center gap-3 ${i === currentStep ? 'step-active border-blue-500' : 'border-slate-800 hover:border-slate-700 bg-slate-900/30'}">
                    <div class="w-6 h-6 rounded bg-slate-800 flex items-center justify-center text-[10px] font-bold ${i === currentStep ? 'text-blue-400' : 'text-slate-500'}">${i + 1}</div>
                    <span class="text-sm font-medium ${i === currentStep ? 'text-blue-100' : 'text-slate-500'}">${step.title}</span>
                </div>
            `).join('');
        }

        function updateSimulation() {
            const step = simulationSteps[currentStep];
            
            // Update Attacker Text
            attackerEl.innerHTML = `"${step.attacker}"`;
            
            // Update Defense Items
            defenseEl.innerHTML = step.defense.map(item => `
                <div class="flex items-center gap-3 bg-emerald-500/5 border border-emerald-500/10 p-4 rounded-xl">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>
                    <span class="text-emerald-400 font-medium">${item}</span>
                </div>
            `).join('');

            // Update Buttons
            prevBtn.disabled = currentStep === 0;
            nextBtn.innerHTML = currentStep === simulationSteps.length - 1 ? "FINISH SIMULATION" : "NEXT PHASE";
            
            renderNav();
        }

        function goToStep(i) {
            currentStep = i;
            updateSimulation();
        }

        nextBtn.addEventListener('click', () => {
            if (currentStep < simulationSteps.length - 1) {
                currentStep++;
                updateSimulation();
            } else {
                alert("Simulation Complete: The Banking Infrastructure is Secure.");
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentStep > 0) {
                currentStep--;
                updateSimulation();
            }
        });

        init();
    </script>
</body>
</html>
